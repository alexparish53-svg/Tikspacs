<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Kullahalvön - Status</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header class="map-header">
    <h1>Tikspac stationer på Kullahalvön</h1>
</header>

<div style="text-align: left; padding-left: 30px;">
    <a href="index.html" class="back-link">⬅ Tillbaka till menyn</a>
</div>

<div class="map-container fade-in">
    <div id="legend">
        <h3>Status</h3>
        <div class="item">
            <img src="images/green.png" alt="Grön">
            <span><b>Grön markör:</b><br>Här finns det påsar kvar!</span>
        </div>
        <div class="item">
            <img src="images/red.png" alt="Röd">
            <span><b>Röd markör:</b><br>Påsar slut. Påfyllning på väg.</span>
        </div>
    </div>

    <div id="map"></div>

    <div id="side-info">
        <img src="images/tikspac.png" alt="Tikspac Station">
        <p><b>Tikspac-station</b><br>Håll utkik efter dessa stolpar längs promenadstråken för att hämta din påse.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="station.js"></script>
<script>
var map = L.map('map').setView([56.25, 12.60], 11);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap',
    crossOrigin: true
}).addTo(map);

var greenIcon = L.icon({ iconUrl: 'images/green.png', iconSize: [30,40], iconAnchor: [15, 40] });
var redIcon   = L.icon({ iconUrl: 'images/red.png',   iconSize: [30,40], iconAnchor: [15, 40] });

stationer.forEach(station => {
    var ikon = station.status === "aktiv" ? greenIcon : redIcon;
    L.marker([station.lat, station.lon], { icon: ikon })
        .addTo(map)
        .bindPopup("<b>" + station.namn + "</b><br>Status: " + (station.status === "aktiv" ? "Finns påsar" : "Slut"));
});
</script>
</body>
</html>

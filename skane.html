<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Skåne karta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<h2>Skåne karta</h2>
<a href="index.html">⬅ Tillbaka</a>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="station.js"></script>

<script>
var map = L.map('map').setView([55.99, 13.00], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var greenIcon = L.icon({ iconUrl: 'images/green.png', iconSize: [30,40] });
var redIcon   = L.icon({ iconUrl: 'images/red.png',   iconSize: [30,40] });

stationer.forEach(station => {
    var ikon = station.status === "aktiv" ? greenIcon : redIcon;
    L.marker([station.lat, station.lon], { icon: ikon })
        .addTo(map)
        .bindPopup(station.namn);
});
</script>

</body>
</html>
